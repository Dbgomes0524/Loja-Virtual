<section class="titulo-cadastro">
    <h2>Cadastro de Pessoa</h2>
</section>

<section class="form-container">

<form name="form_cadastro" id="form_cadastro" class="form-cadastro">

<label for="nome">Nome</label>
<input type="text" name="nome" id="nome" maxlength="60" required placeholder="Digite seu nome">


<label for="cpf">CPF</label>
<input type="text" name="cpf" id="cpf" maxlength="14" required placeholder="Digite seu CPF">


<label for="email">Email</label>
<input type="email" name="email" id="email" maxlength="100" required placeholder="Digite seu email">


<label for="telefone">Telefone</label>
<input type="text" name="telefone" id="telefone" maxlength="11" required placeholder="Digite seu telefone">


<label for="cep">CEP</label>
<input type="text" name="cep" id="cep" maxlength="9" required placeholder="Digite seu CEP">


<div id="divEndereco" class="oculto">

<label for="logradouro">Logradouro</label>
<input type="text" name="logradouro" id="logradouro" class="input01" maxlength="120" required placeholder="Rua / Avenida">


<label for="numero">Número</label>
<input type="text" name="numero" id="numero" class="input03" maxlength="10" required placeholder="Número">


<label for="complementoEndereco">Complemento</label>
<input type="text" name="complementoEndereco" id="complementoEndereco" class="input01" maxlength="120" placeholder="Complemento">


<label for="bairro">Bairro</label>
<input type="text" name="bairro" id="bairro" maxlength="60" class="input02" required placeholder="Bairro">


<label for="localidade">Cidade</label>
<input type="text" name="localidade" id="localidade" class="input02" maxlength="60" required placeholder="Cidade">


<label for="uf">UF</label>
<input type="text" name="uf" id="uf" maxlength="2" class="input03" required placeholder="UF">

</div>


<label for="senha">Senha</label>
<input type="password" name="senha" id="senha" maxlength="6" required placeholder="Digite sua senha">


<div class="checkbox">

<input type="checkbox" id="ofertas">
<label for="ofertas">Deseja receber ofertas por email ou WhatsApp?</label>

</div>

<div class="botoes">

<button type="submit" id="btnCadastrar" class="btn-cadastrar">
Cadastrar
</button>

<button type="reset" id="btnLimpar" class="btn-limpar">
Limpar
</button>

</div>

</form>

</section>
